#                               Starship configuration file                           #
# =================================================================================== #

# NOTE: Use line drawing character `─` for all serperators

# ==================== Settings ====================

# Get editor completions
"$schema" = "https://starship.rs/config-schema.json"

# newline between prompts
add_newline = true

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

palette = "catppuccin_mocha"

# ==================== Prompt ====================

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$nix_shell\
\
$fill \
\
$status\
$hostname\
$cmd_duration\
$sudo\
$memory_usage\
$time\
\
$line_break\
$character\
"""

# ==================== Modules ====================

# ========== Aesthetic ==========

[fill]
disabled = false
style = "spacer_color"
symbol = "─"

[character]
disabled = false
success_symbol = "  [➔](bold green)"
error_symbol = "  [➔](bold red)"

# ========== Files and Directories ==========

[directory]
disabled = false
truncation_length = 1
truncation_symbol = ""
style = "dir_color"
format = " [ $path]($style) "

# ========== Git ==========

# shows branch name
[git_branch]
disabled = false
symbol = "󰊢"
style = "git_orange"
format = "[─](spacer_color) [$symbol $branch]($style) "

# shows status of the repo (conflict, ahead, behind, etc)
[git_status]
disabled = false

ahead = "↑${count} "
behind = "↓${count} "
diverged = "↓${ahead_count}↑${behind_count} "
modified = "!${count} "
untracked = "?${count} "
stashed = "*${count} "
conflicted = "~${count} "
staged = "+${count} "
deleted = "-${count} "

format = """
[$ahead_behind](git_ahead_behind)\
[$stashed](git_stashed)\
[$conflicted](git_conflicted)\
[$staged](git_staged)\
[$deleted](git_deleted)\
[$modified](git_modified)\
[$untracked](git_untracked)\
"""

# shows state of any git operations (rebase, merge, etc)
[git_state]
disabled = false
style = "git_state_color"
format = "[─](spacer_color) [󰚖 $state ($progress_current/$progress_total)]($style) "
rebase = "REBASE"
merge = "MERGE"
revert = "REVERT"
cherry_pick = "CHERRY"
bisect = "BISECT"
am = "AM"
am_or_rebase = "AM/REBASE"

# ========== Time ==========

[cmd_duration]
disabled = false
style = "timer_color"
format = "[󰔛 $duration]($style) [─](spacer_color) "

[time]
disabled = false
style = "clock_color"
time_format = "%I:%M:%S"
format = "[ $time]($style) "

# ========== Conditional Information ==========

[nix_shell]
disabled = false
symbol = "󱄅"
style = "nix_color"
pure_msg = "pure"
impure_msg = "impure"
unknown_msg = "dev"
heuristic = true                                                      # checks for /nix/store in $path, disable if too many false positives
format = "[─](spacer_color) [$symbol $name \\[$state\\]](nix_color) "

[memory_usage]
disabled = false
threshold = 70
symbol = ""
style = "memory_color"
format = "[$symbol $ram_pct]($style) [─](spacer_color) "

[status]
disabled = false
style = "red"
symbol = ""
recognize_signal_code = false
format = "[$symbol $status]($style) [─](spacer_color) "

[hostname]
disabled = false
ssh_only = true
trim_at = "."
style = "bold yellow"
format = "[󰒋 $hostname]($style) [─](spacer_color) "

[sudo]
disabled = false
format = "[SUDO]($style) [─](spacer_color) "
symbol = ""
style = "bold red"

# ==================== Colors ====================

[palettes.catppuccin_mocha]
spacer_color = "#45475a" # surface (structural)
timer_color = "#e8c84a"  # yellow-bright
dir_color = "#6aa4f8"    # blue-bright
clock_color = "#5ab8e8"  # azure-bright
memory_color = "#ee8888" # salmon-bright
nix_color = "#b080f0"    # purple-bright

git_orange = "#f06040"       # derived: git-branch
git_state_color = "#f5906a"  # derived: git-state
git_modified = "#e8c84a"     # yellow-bright
git_untracked = "#6aa4f8"    # blue-bright
git_ahead_behind = "#6de07a" # green-bright
git_staged = "#6de07a"       # green-bright
git_unstaged = "#6aa4f8"     # blue-bright
git_stashed = "#b080f0"      # purple-bright
git_conflicted = "#e84070"   # red-bright
git_deleted = "#e84070"      # red-bright
