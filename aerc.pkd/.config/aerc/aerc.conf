# aerc main configuration

[general]

default-save-path="/tmp/"

# ========== LOGGING ==========
log-file="/tmp/aerc.log"
log-level="info" # trace, debug, info, warn, error

disable-ipc=true

enable-osc8=true

[ui]

# ========== MAILBOX FORMAT ==========

index-columns=date<=,flags:=,name<20%,subject
styleset-name="custom"
column-separator=" ┃ "
sidebar-width=16

# ========== DATE FORMAT ==========

this-day-time-format=" 3:04 PM"
this-week-time-format=" Mon 3:04 PM"
this-year-time-format=" Mon 1-2"
timestamp-format=" 1/2/2006"
message-view-timestamp-format="3:04 PM 1/2/2006"

# ========== TERM INTEGRATION ==========

mouse-enabled="true"
new-message-bell="false"

# ========== TITLES ==========

pinned-tab-marker='*'
tab-title-composer="{{if .To}}to:{{index (.To | shortmboxes) 0}} {{end}}"
tab-title-viewer="{{if gt (len .Subject) 40}}{{head 20 .Subject}}...{{else}}{{.Subject}}{{end}}"

# Unread/Count indicators
dirlist-right='{{if eq .Folder "Inbox"}}{{humanReadable .Unread}}{{else if eq .Folder "Spam"}}{{humanReadable .Unread}}{{else if eq .Folder "Drafts"}}{{humanReadable .Exists}}{{else}}{{end}}'

# box drawing for borders
border-char-vertical="│"
border-char-horizontal="─"

# ========== THREADING ==========

threading-enabled=true
reverse-thread-order=true
force-client-threads=true
show-thread-context=true
thread-prefix-tip = "▸ "
thread-prefix-last-sibling = "╰─"
thread-prefix-last-sibling-reverse = "╭─"

[statusline]

column-left=" [{{.StatusInfo}}]"
column-center="{{.PendingKeys}}"
column-right="{{.Exists}} "

[viewer]

pager="less -Rc --tilde"

# type preference in multipart emails
alternatives=text/html,text/plain

# Headers to display
header-layout=From,To,Cc|Bcc,Date,Subject

# max height of mimetype switcher
max-mime-height = 3

[compose]

editor="vim"

# Default headers when composing
header-layout=From,To,Subject

# command to complete addresses (can be set per account in accounts.conf)
# address-book-cmd='/Users/scc/.config/mail-scripts/address-book "%s"'

# set file picker for attachments
file-picker-cmd="lf -print-selection -command 'set nopreview' -command 'set ratios 1' %s"

empty-subject-warning=true
reply-to-self=false

[multipart-converters]

# Converters allow to generate multipart/alternative messages by converting the
# main text/plain part into any other MIME type. Only exact MIME types are
# accepted. The commands are invoked with sh -c and are expected to output
# valid UTF-8 text.
#
# Example (obviously, this requires that you write your main text/plain body
# using the markdown syntax):
#text/html=pandoc -f markdown -t html --standalone

[filters]
#
# Filters allow you to pipe an email body through a shell command to render
# certain emails differently, e.g. highlighting them with ANSI escape codes.
#
# The commands are invoked with sh -c. The following folders are prepended to
# the system $PATH to allow referencing filters from their name only:
#
#   ${XDG_CONFIG_HOME:-~/.config}/aerc/filters
#   ~/.local/libexec/aerc/filters
#   ${XDG_DATA_HOME:-~/.local/share}/aerc/filters
#   $PREFIX/libexec/aerc/filters
#   $PREFIX/share/aerc/filters
#   /usr/libexec/aerc/filters
#   /usr/share/aerc/filters
#
# If you want to run a program in your default $PATH which has the same name
# as a builtin filter (e.g. /usr/bin/colorize), use its absolute path.
#
# The following variables are defined in the filter command environment:
#
#   AERC_MIME_TYPE      the part MIME type/subtype
#   AERC_FORMAT         the part content type format= parameter
#   AERC_FILENAME       the attachment filename (if any)
#   AERC_SUBJECT        the message Subject header value
#   AERC_FROM           the message From header value
#
# The first filter which matches the email's mimetype will be used, so order
# them from most to least specific.
#
# You can also match on non-mimetypes, by prefixing with the header to match
# against (non-case-sensitive) and a comma, e.g. subject,text will match a
# subject which contains "text". Use header,~regex to match against a regex.
#
"text/plain"="colorize"
"text/calendar"="calendar"
"message/delivery-status"="colorize"
"message/rfc822"="colorize"
# "text/html"="pandoc -f html -t plain | colorize"

"application/x-tex"="bat"

# "text/html"="! html"
# "text/html"="html | colorize"

"text/html"="! w3m -T text/html -I UTF-8"
#text/*=bat -fP --file-name="$AERC_FILENAME"
#application/x-sh=bat -fP -l sh
"image/*"="catimg -w $(tput cols) -"
"application/pdf"="pdftotext - -"
"application/gzip"="! tmpfile=$(mktemp) && cat > $tmpfile && tar tf $tmpfile && rm -f $tmpfile"
#subject,~Git(hub|lab)=lolcat -f
#from,thatguywhodoesnothardwraphismessages=wrap -w 100 | colorize

# This special filter is only used to post-process email headers when
# [viewer].show-headers=true
# By default, headers are piped directly into the pager.
#
".headers"="colorize"

[openers]
#
# Openers allow you to specify the command to use for the :open and :open-link
# actions on a per-MIME-type basis. The :open-link URL scheme is used to
# determine the MIME type as follows: x-scheme-handler/<scheme>.
#
# {} is expanded as the temporary filename or URL to be opened with proper
# shell quoting. If it is not encountered in the command, the filename/URL will
# be appended to the end of the command. The command will then be executed with
# `sh -c`.
#
# Like [filters], openers support basic shell globbing. The first opener which
# matches the part's MIME type (or URL scheme handler MIME type) will be used,
# so order them from most to least specific.
#
# Examples:
# x-scheme-handler/irc=hexchat
# "x-scheme-handler/http*"="printf '%s' {} | pbcopy"
# text/html=surf -dfgms
# text/plain=gvim {} +125
# message/rfc822=thunderbird
"x-scheme-handler/http*"="open"
# "x-scheme-handler/https"="open {}"

