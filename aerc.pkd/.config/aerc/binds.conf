# Binds are of the form <key sequence> = <command to run>
# To use '=' in a key sequence, substitute it with "Eq": "<Ctrl+Eq>"
# If you wish to bind #, you can wrap the key sequence in quotes: "#" = quit

H = :prev-tab<Enter>      # last tab
L = :next-tab<Enter>      # next tab
<C-q> = :quit<Enter>      # quit
<C-Q> = :quit -f<enter>   # force quit
<C-z> = :suspend<Enter>   # suspend
<C-r> = :reload<Enter>    # reloads binds, config

# ? = :choose -o 1 "keys" ":help keys" -o 2 "queries" ":terminal man notmuch-search-terms"<Enter>
? = :menu -t "Help Pages" -c "echo '' | ~/.config/aerc/menu help" :help<Enter>

[messages]

# ========== NAVIGATION ==========

j = :next<Enter>              # message down
k = :prev<Enter>              # message up
<PgDn> = :next 100%<Enter>    # page down
<PgUp> = :prev 100%<Enter>    # page uo
gg = :select 0<Enter>         # jump first message
G = :select -1<Enter>         # jump last message
q = :quit<Enter>              # quit
Q = :quit -f<Enter>           # force quit
<Enter> = :view<Enter>        # open message
<1> = :ct 0<Enter>            # switch -> tab 1
<2> = :ct 1<Enter>            # switch -> tab 2
<3> = :ct 2<Enter>            # switch -> tab 3
<4> = :ct 3<Enter>            # switch -> tab 4
<5> = :ct 4<Enter>            # switch -> tab 5
<6> = :ct 5<Enter>            # switch -> tab 6
<7> = :ct 6<Enter>            # switch -> tab 7
<8> = :ct 7<Enter>            # switch -> tab 8
<9> = :ct 8<Enter>            # switch -> tab 9
<right> = :next-tab<enter>    # tab right
<left> = :prev-tab<enter>     # tab left
<J> = :next-folder<Enter>  # folder down
<K> = :prev-folder<Enter>    # folder up

# ========== VIEW ==========

p = :split<Enter>             # pop-up preview
P = :vsplit<Enter>            # side-by-side preview
<tab> = :fold -t<Enter>       # hide chains
<backtab> = :fold -ta<Enter>  # hide all chains

# ========== MESSAGES ==========

u = :filter -u<Enter>                                     # show unread
d = :choose -o y 'Delete Message' 'mv Trash<Enter>'       # delete
D = :choose -o y 'PERMENANTLY Delete Message' delete-message<Enter> # permentantly delete
a = :choose -o y 'Archive message' 'archive flat<Enter>'  # archive
A = :archive flat<Enter>                                  # force archive
V = :mark -V<Enter>                                       # visual-style select
m = :mark -tT<Enter>                                      # mark message
M = :remark<Enter>                                        # re-mark messages
c = :compose<Enter>                                       # compose
b = :bounce<Enter>                                        # resend
f = :forward -A<Enter>                                    # forward
F = :forward -As<enter>                                   # forward fast
<Space> = :unread -t<Enter>                               # mark as unread/read
<Esc> = :unmark -a<Enter> :clear<Enter>                   # reset



# reply menu
r = :menu -t "Reply To" -c "echo '' | ~/.config/aerc/menu reply" :reply<Enter>

# tag menu
t = :menu -t "Flag Message" -c "echo '' | ~/.config/aerc/menu flag" :flag<Enter>

# info menu
i = :envelope<Enter>
I = :menu -t "Get Info" -c "echo '' | ~/.config/aerc/menu info" :echo<Enter>

# sort menu
s = :menu -t "Sort By" -c "echo '' | ~/.config/aerc/menu rsort" :sort<Enter>
S = :menu -t "Sort By - Reversed" -c "echo '' | ~/.config/aerc/menu sort" :sort<Enter>

# Terminal
| = :pipe<space>          # pipe email into command

# Searching
\ = :search<space>        # jump to match
/ = :filter<space>        # filter matches
n = :next-result<Enter>   # next result
N = :prev-result<Enter>   # previous result


[messages:folder=Drafts]
<Enter> = :recall<Enter>

[view]
/ = :toggle-key-passthrough<Enter>/
q = :close<Enter>
O = :open<Enter>
o = :open-link<space>
S = :save<space>
| = :pipe<space>
# D = :delete<Enter>
# A = :archive flat<Enter>

# save menu
<C-s> = :menu -t "Save to Dir" -c "lf -print-last-dir -command 'set nopreview' -command 'set ratios 1' -command 'set dironly'" :save<Enter>

<down> = :next-part<enter>
<up> = :prev-part<enter>

<C-y> = :copy-link <space>
<C-l> = :open-link <space>

f = :forward<Enter>

# reply menu
r = :menu -t "Reply To" -c "echo '' | ~/.config/aerc/menu reply" :reply<Enter>

# H = :toggle-headers<Enter>
<C-k> = :prev-part<Enter>
<C-Up> = :prev-part<Enter>
<C-j> = :next-part<Enter>
<C-Down> = :next-part<Enter>
J = :next<Enter>
<C-Right> = :next<Enter>
K = :prev<Enter>
<C-Left> = :prev<Enter>

[view::passthrough]
$noinherit = true
$ex = <C-x>
<Esc> = :toggle-key-passthrough<Enter>

[compose]
# Keybindings used when the embedded terminal is not selected in the compose
# view
$noinherit = true
$ex = <C-x>
$complete = <C-o>
<C-q> = :abort<Enter>
<C-k> = :prev-field<Enter>
<C-Up> = :prev-field<Enter>
<C-j> = :next-field<Enter>
<C-Down> = :next-field<Enter>
<A-p> = :switch-account -p<Enter>
<C-Left> = :switch-account -p<Enter>
<A-n> = :switch-account -n<Enter>
<C-Right> = :switch-account -n<Enter>
<tab> = :next-field<Enter>
<backtab> = :prev-field<Enter>
<C-p> = :prev-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgDn> = :next-tab<Enter>
<C-d> = :prompt draft? :postpone<Enter>

[compose::editor]
# Keybindings used when the embedded terminal is selected in the compose view
$noinherit = true
$ex = <C-x>
<C-q> = :abort<Enter>
<C-k> = :prev-field<Enter>
<C-Up> = :prev-field<Enter>
<C-j> = :next-field<Enter>
<C-Down> = :next-field<Enter>
<C-p> = :prev-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgDn> = :next-tab<Enter>

[compose::review]
# Keybindings used when reviewing a message to be sent
# Inline comments are used as descriptions on the review screen
y = :send<Enter> # Send
n = :abort<Enter> # Abort (discard message, no confirmation)
s = :sign<Enter> # Toggle signing
x = :encrypt<Enter> # Toggle encryption to all recipients
v = :preview<Enter> # Preview message
p = :postpone<Enter> # Postpone
q = :choose -o d discard abort -o p postpone postpone<Enter> # Abort or postpone
e = :edit<Enter> # Edit (body and headers)
a = :attach<space> # Add attachment
d = :detach<space> # Remove attachment

[terminal]
$noinherit = true
$ex = <C-x>

<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-PgDn> = :next-tab<Enter>
