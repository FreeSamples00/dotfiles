# ========================= MACOS SETTINGS =========================
# Desktop & Doc > Displays have seperate spaces = off

# ========================= DOCUMENTATION =========================
# GUIDE: https://nikitabobko.github.io/AeroSpace/guide
# COMMANDS: https://nikitabobko.github.io/AeroSpace/commands#
# GOODIES: https://nikitabobko.github.io/AeroSpace/goodies
# GITHUB: https://github.com/nikitabobko/AeroSpace

# ========================= GLOBAL SETTINGS =========================

after-startup-command = [
  "exec-and-forget borders",    # for focused windows highligtinh
  "exec-and-forget sketchybar", # for custom menubar
]

# ========== auto-start ==========
start-at-login = true

# ========== Normalizations ==========
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ========== accordian ==========
accordion-padding = 30

# ========== layout defaults ==========
# tiles|accordion
default-root-container-layout = "tiles"

# horizontal|vertical|auto
default-root-container-orientation = "auto"

# ========== disable macos hide behavior ==========
automatically-unhide-macos-hidden-apps = true

# ========== events ==========
exec-on-workspace-change = [
  "/bin/bash",
  "-c",
  "sketchybar --trigger aerospace_workspace_change",
]

on-focused-monitor-changed = "move-mouse monitor-lazy-center"

# ========== monitor settings ==========
[workspace-to-monitor-force-assignment]
1 = "main"
2 = "main"
3 = "main"

4 = "secondary"
5 = "secondary"
6 = "secondary"

# ========== keyboard layout ==========
[key-mapping]
preset = "qwerty"

# ========== window spacing ==========
[gaps]
# between windows
inner.horizontal = 8
inner.vertical = 8

# between windows and screen edge
outer.left = 8
outer.bottom = 8
outer.right = 8
outer.top = [{ monitor."built-in" = 8 }, { monitor."main" = 40 }, 40]

# ========================= APP SPECIFIC SETTINGS =========================

# macOS native
[[on-window-detected]]
if.app-name-regex-substring = "messages|finder|find my|maps|reminders|calendar|music|weather|activity monitor|photos|mail|passwords|clock|contacts"
run = "layout floating"

# non-native
[[on-window-detected]]
if.app-name-regex-substring = "discord|crossover|steam|proton *|outlook|discord*"
run = "layout floating"

# ========================= MAIN BINDINGS =========================
[mode.main.binding]
# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
#                   sectionSign (ISO keyboards only, european keyboards only)
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# ========================= GENERAL HOTKEYS =========================

# Screenshots
# - hold ctrl while taking to save directly to clipboard
# - otherwise saves to /tmp from GUI
# - space cycles between area and window selection mode
# NOTE: abt once a year will need to remove and re-add aerospace to screen capture perms
cmd-alt-ctrl-shift-s = 'exec-and-forget screencapture -diu -J "window" "/tmp/"'

# ========================= APPLICATION HOTKEYS =========================

# GHOSTTY
cmd-alt-ctrl-space = "exec-and-forget open -na ghostty"

# CALCULATOR
cmd-alt-ctrl-c = "exec-and-forget open -a calculator"

# MESSAGES
cmd-alt-ctrl-s = "exec-and-forget open -a messages"

# ZEN
cmd-alt-ctrl-w = "exec-and-forget open -na zen"

# MAIL
cmd-alt-ctrl-m = 'exec-and-forget open -a "proton mail"'
cmd-alt-ctrl-shift-m = 'exec-and-forget open -a "microsoft outlook"'

# PROTON PASS
cmd-alt-ctrl-p = 'exec-and-forget open -a "proton pass"'

# VPN
cmd-alt-ctrl-v = 'exec-and-forget open -a "ProtonVPN"'

# DISCORD
cmd-alt-ctrl-d = 'exec-and-forget open -a "Discord"'

# FINDER
cmd-alt-ctrl-f = 'exec-and-forget open -a "Finder"'

# BTOP
cmd-alt-ctrl-t = "exec-and-forget open -na ghostty.app --args -e btop"

# ACTIVITY MONITOR
cmd-alt-ctrl-shift-t = 'exec-and-forget open -a "activity monitor"'

# ========================= TILING HOTKEYS =========================

# ========== layout ==========
cmd-alt-ctrl-enter = [
  "layout h_tiles h_accordion",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
cmd-alt-ctrl-shift-enter = [
  "layout floating tiling",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
cmd-alt-ctrl-r = [
  "flatten-workspace-tree",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
cmd-alt-ctrl-shift-r = ["reload-config", "exec-and-forget sketchybar --reload"]

# ========== focus ==========
cmd-alt-ctrl-j = "focus left"
cmd-alt-ctrl-k = "focus right"

# ========== move windows ==========
cmd-alt-ctrl-shift-j = "move left"
cmd-alt-ctrl-shift-k = "move right"

# ========== resize windows ==========
cmd-alt-ctrl-minus = "resize smart -50"
cmd-alt-ctrl-equal = "resize smart +50"

# ========== workspaces ==========
cmd-alt-ctrl-1 = "workspace 1"
cmd-alt-ctrl-2 = "workspace 2"
cmd-alt-ctrl-3 = "workspace 3"
cmd-alt-ctrl-4 = "workspace 4"
cmd-alt-ctrl-5 = "workspace 5"
cmd-alt-ctrl-6 = "workspace 6"

cmd-alt-ctrl-shift-1 = [
  "move-node-to-workspace 1",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
cmd-alt-ctrl-shift-2 = [
  "move-node-to-workspace 2",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
cmd-alt-ctrl-shift-3 = [
  "move-node-to-workspace 3",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
cmd-alt-ctrl-shift-4 = [
  "move-node-to-workspace 4",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
cmd-alt-ctrl-shift-5 = [
  "move-node-to-workspace 5",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
cmd-alt-ctrl-shift-6 = [
  "move-node-to-workspace 6",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]

# ========== monitors ==========
cmd-alt-ctrl-tab = "focus-monitor --wrap-around next"
cmd-alt-ctrl-shift-tab = [
  "move-node-to-monitor --wrap-around next",
  "focus-monitor --wrap-around next",
  "exec-and-forget sketchybar --trigger aerospace_workspace_change",
]
