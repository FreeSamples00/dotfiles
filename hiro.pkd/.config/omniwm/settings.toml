# MONITOR OVERRAYS (top-level arrays)
monitorBarOverrides = [

] # [{monitorDisplayId, monitorName, backgroundOpacity, windowLevel, xOffset, yOffset}]
monitorDwindleOverrides = [] # per-monitor dwindle overrides
monitorNiriOverrides = [] # per-monitor niri overrides
monitorOrientationOverrides = [] # per-monitor orientation overrides

[appearance]
mode = "dark" # "dark" | "light"

[borders]
enabled = true # bool
width = 1.0    # double (points)

[borders.color]
alpha = 0.5 # 0.0–1.0
blue = 1.0  # 0.0–1.0
green = 1.0 # 0.0–1.0
red = 1.0   # 0.0–1.0

[clipboard]
historyEnabled = false   # bool
maxItemBytes = 8388608   # int
maxItems = 200           # int
maxTotalBytes = 67108864 # int

[dwindle]
defaultSplitRatio = 1.0         # double
moveToRootStable = true         # bool
singleWindowAspectRatio = "4:3" # "none" | "4:3" | "16:9" | "3:2" | "1:1"
smartSplit = false              # bool
splitWidthMultiplier = 1.0      # double
useGlobalGaps = true            # bool

[focus]
followsMouse = false            # bool
followsWindowToMonitor = false  # bool
moveMouseToFocusedWindow = true # bool

[gaps]
size = 8.0 # double (inner gap, points)

[gaps.outer]
bottom = 0.0 # double
left = 0.0   # double
right = 0.0  # double
top = 30.0   # double

[general]
animationsEnabled = true                # bool
defaultLayoutType = "niri"              # "niri" | "dwindle"
hotkeysEnabled = true                   # bool
hyperKeyHoldThresholdMilliseconds = 150 # int (ms before Hyper key triggers)
hyperTrigger = "Left Option"            # "Option" | "Left Option" | "Right Option" | "Shift" |
# "Control" | "Command" | "CapsLock" |
# "Control+Option+Shift+Command" (System Hyper) |
# "MouseButton2"+ | key name
ipcEnabled = true           # bool
preventSleepEnabled = false # bool
updateChecksEnabled = true  # bool

[gestures]
fingerCount = 4                   # 2 | 3 | 4
invertDirection = true            # bool
mouseResizeModifierKey = "option" # "option" | "optionShift"
scrollEnabled = true              # bool
scrollModifierKey = "optionShift" # "option" | "optionShift" | "control" | "controlShift" | "command"
scrollSensitivity = 5.0           # double 1.0–10.0

[mouseWarp]
axis = "horizontal" # "horizontal" | "vertical"
margin = 1          # int
monitorOrder = []   # [string] display names

[niri]
alwaysCenterSingleColumn = false # bool
centerFocusedColumn = "never" # "never" | "on-focus" | "always"
columnWidthPresets = [
  0.3333333333333333,
  0.5,
  0.6666666666666666,
] # [double] 0.0–1.0
defaultColumnWidth = 0.5 # double 0.0–1.0
infiniteLoop = false # bool
maxVisibleColumns = 3 # int
singleWindowAspectRatio = "none" # "none" | "4:3" | "16:9" | "3:2" | "1:1"
# TODO: how to handle this for both native and ultrawide

[quakeTerminal]
animationDuration = 0.2       # double (seconds)
autoHide = false              # bool
enabled = true                # bool
heightPercent = 50.0          # double 0–100
monitorMode = "focusedWindow" # "focusedWindow" | "mouse" | "main"
opacity = 0.8                 # double 0.0–1.0
position = "top"              # "top" | "bottom" | "left" | "right" | "center"
widthPercent = 50.0           # double 0–100

[statusBar]
showAppNames = false      # bool
showWorkspaceName = false # bool
useWorkspaceId = false    # bool

[workspaceBar]
backgroundOpacity = 0.1         # double 0.0–1.0
deduplicateAppIcons = false     # bool
enabled = true                  # bool
height = 24.0                   # double
hideEmptyWorkspaces = false     # bool
labelFontSize = 12.0            # double
notchAware = true               # bool
position = "overlappingMenuBar" # "overlappingMenuBar" | "belowMenuBar" | "top" | "bottom" | "left" | "right"
reserveLayoutSpace = false      # bool
showFloatingWindows = false     # bool
showLabels = true               # bool
windowLevel = "popup"           # "popup" | "floating"
xOffset = 0.0                   # double
yOffset = 0.0                   # double
# Optional: [workspaceBar.accentColor] / [workspaceBar.textColor]
#   red, green, blue, alpha — double 0.0–1.0

