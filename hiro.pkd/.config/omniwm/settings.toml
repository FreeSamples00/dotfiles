# HOTKEYS — binding: "Modifier+Modifier+Key" | "Hyper+Key" | "Unassigned"
#   Modifiers: Control, Option, Shift, Command, Hyper
#   Sequences: "Leader, Hyper+A"
#   Scheme: Control+Option+Command (= cmd+alt+ctrl from Aerospace)
#   Keys: A-Z, 0-9, Return, Tab, Space, Equal, Minus, Grave, Comma, Period, Slash,
#         Backslash, Left/Right/Up/Down Arrow, Home, End, Page Up, Page Down,
#         F1-F20, Delete, Escape, Left/Right Bracket, Semicolon, Quote, CapsLock,
#         KP0-KP9, KP+, KP-, KP*, KP/, KP., KPClear, KPEnter, KP=
#   Action IDs: switchWorkspace.0-.8, moveToWorkspace.0-.8, workspaceBackAndForth,
#     switchWorkspace.next/.previous, focus.left/down/up/right, focusPrevious,
#     focusDownOrLeft, focusUpOrRight, focusColumn.0-.8, focusColumnFirst/Last,
#     focusWindowInColumn.1-.9, focusWindowTop/Bottom, focusWindowDownOrTop,
#     focusWindowUpOrBottom, focusWindowOrWorkspaceDown/Up, centerColumn,
#     centerVisibleColumns, move.left/down/up/right, moveWindowDown/Up,
#     moveWindowDownOrToWorkspaceDown/Up, consumeOrExpelWindowLeft/Right,
#     consumeWindowIntoColumn, expelWindowFromColumn, focusMonitorNext/Previous/Last,
#     toggleFullscreen, toggleNativeFullscreen, moveColumn.left/right,
#     moveColumnToFirst/Last, moveColumnToIndex.1-.9, toggleColumnTabbed,
#     cycleColumnWidthForward/Backward, cycleWindowWidthForward/Backward,
#     cycleWindowHeightForward/Backward, toggleColumnFullWidth,
#     expandColumnToAvailableWidth, resetWindowHeight,
#     setColumnWidth.decrease10Percent/increase10Percent,
#     setWindowWidth.decrease10Percent/increase10Percent,
#     setWindowHeight.decrease10Percent/increase10Percent,
#     balanceSizes, moveToRoot, toggleSplit, swapSplit, toggleWorkspaceLayout,
#     resizeGrow.left/right/up/down, resizeShrink.left/right/up/down,
#     preselect.left/right/up/down, preselectClear, openCommandPalette,
#     raiseAllFloatingWindows, rescueOffscreenWindows, toggleFocusedWindowFloating,
#     assignFocusedWindowToScratchpad, toggleScratchpadWindow, openMenuAnywhere,
#     toggleWorkspaceBarVisibility, toggleHiddenBar, toggleQuakeTerminal, toggleOverview,
#     moveWindowToWorkspaceUp/Down, moveColumnToWorkspace.0-.8/Up/Down

